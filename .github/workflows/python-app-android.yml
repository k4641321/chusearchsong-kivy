name: android-build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
        python3-virtualenv autoconf libtool pkg-config zlib1g-dev \
        libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev \
        libssl-dev automake autopoint gettext
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools
        pip install buildozer cython==0.29.34 kivy["base"] aiohttp loguru
        
    - name: Configure Buildozer and install Android SDK with build-tools
      run: |
        # First build attempt to trigger SDK download
        echo "Initial build attempt to download SDK..."
        buildozer android debug --verbose || true
        
        # Manually install build-tools which contains AIDL
        echo "Installing Android build-tools..."
        $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;30.0.3"
        
        # Accept licenses
        yes | $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
        
    - name: Build Android APK
      run: |
        buildozer -v android debug
        
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/*.apk