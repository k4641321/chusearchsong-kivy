# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: android-build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
        python3-virtualenv autoconf libtool pkg-config zlib1g-dev \
        libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev \
        libssl-dev automake autopoint gettext
        # curl https://sh.rustup.rs -sSf | sh -y

        python -m pip install --upgrade pip setuptools
        pip install buildozer, setuptools, cython==0.29.34,kivy["full"],aiohttp,loguru
        buildozer -v android debug

    - name: 构建
      run: |
        buildozer -v android debug
    - name: 输出
      uses: actions/upload-artifact@v4
      with:
        path: .\build\chusearchsong\android\gradle\app\build\outputs\apk\
