name: android-build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
          python3-virtualenv autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev \
          libssl-dev automake autopoint gettext
          curl https://sh.rustup.rs -sSf | sh
          
      # 4. 安装 Python 依赖
      - name: Install python dependencies
        run: |
          pip install buildozer setuptools cython==0.29.34
          pip install aiohttp kivy['full'] loguru

      # 5. 构建 APK
      - name: Build APK
        run: buildozer -v android debug

      # 6. 上传 APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk