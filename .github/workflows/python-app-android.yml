name: android-build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
        python3-virtualenv autoconf libtool pkg-config zlib1g-dev \
        libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev \
        libssl-dev automake autopoint gettext
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools
        pip install buildozer cython==0.29.34 kivy["base"] aiohttp loguru
        
    - name: Set up Android SDK and NDK
      run: |
        # Create directories for Android tools
        mkdir -p ~/.buildozer/android/platform
        # Buildozer will automatically download SDK and NDK if not present
        # But we need to ensure we have the build-tools which include AIDL
        echo "Configuring buildozer for Android build..."
        
    - name: Build Android APK
      run: |
        # Accept Android SDK licenses automatically
        yes | buildozer android accept-sdk-license
        # Build the APK with verbose output
        buildozer -v android debug
        
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/*.apk